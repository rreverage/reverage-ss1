<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVERAGE SS1 - Упрощенная админка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        button {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        button.danger { background: #ff4444; color: white; }
        .product-card {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .products-list { margin-top: 20px; }
        input, select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            margin: 5px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h2 { font-size: 32px; color: #00ff00; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 100px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ REVERAGE SS1 - Упрощенная админка</h1>
        
        <div class="stats" id="stats">
            <div class="stat-card"><h2 id="totalProducts">0</h2><p>Товаров</p></div>
            <div class="stat-card"><h2 id="totalOrders">0</h2><p>Заказов</p></div>
        </div>
        
        <button onclick="showAddProductModal()">➕ Добавить товар</button>
        <button onclick="loadData()">🔄 Обновить</button>
        <button onclick="logout()">🚪 Выход</button>
        
        <div class="products-list" id="productsList"></div>
    </div>
    
    <!-- Модальное окно добавления товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Добавить товар</h3>
            <div class="form-group">
                <label>Название:</label>
                <input type="text" id="prodName" placeholder="Название товара">
            </div>
            <div class="form-group">
                <label>Цена:</label>
                <input type="number" id="prodPrice" placeholder="Цена в ₽">
            </div>
            <div class="form-group">
                <label>Категория:</label>
                <select id="prodCategory">
                    <option value="tshirts">Футболки</option>
                    <option value="hoodies">Худи</option>
                    <option value="jackets">Куртки</option>
                    <option value="pants">Штаны</option>
                    <option value="shorts">Шорты</option>
                    <option value="accessories">Аксессуары</option>
                </select>
            </div>
            <div class="form-group">
                <label>Размеры:</label>
                <input type="text" id="prodSizes" placeholder="S,M,L,XL">
            </div>
            <div class="form-group">
                <label>URL фото:</label>
                <input type="text" id="prodImg" placeholder="https://...">
            </div>
            <button onclick="addProduct()">Сохранить</button>
        </div>
    </div>
    
    <script>
        let products = [];
        let orders = [];
        
        function loadData() {
            const savedProducts = localStorage.getItem('reverage_products');
            if (savedProducts) {
                products = JSON.parse(savedProducts);
            } else {
                products = [
                    { id: 1, name: "OVERSIZED HOODIE BLACK", price: 8990, category: "hoodies", sizes: ["S","M","L","XL"], img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=200" },
                    { id: 2, name: "CARGO PANTS SS1", price: 7490, category: "pants", sizes: ["S","M","L","XL"], img: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=200" },
                    { id: 3, name: "GRAPHIC TEE WHITE", price: 3990, category: "tshirts", sizes: ["S","M","L","XL"], img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=200" }
                ];
            }
            
            const savedOrders = localStorage.getItem('reverage_orders_admin');
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
            } else {
                orders = [];
            }
            
            updateStats();
            renderProducts();
        }
        
        function updateStats() {
            document.getElementById('totalProducts').innerText = products.length;
            document.getElementById('totalOrders').innerText = orders.length;
        }
        
        function renderProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = '<p>Нет товаров. Добавьте первый!</p>';
                return;
            }
            
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <div>
                        <strong>${p.name}</strong><br>
                        ${p.price.toLocaleString()} ₽<br>
                        <small>${p.category} | ${p.sizes.join(", ")}</small>
                    </div>
                    <div>
                        <button onclick="editProduct(${p.id})">✏️ Изменить</button>
                        <button class="danger" onclick="deleteProduct(${p.id})">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        function showAddProductModal() {
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodCategory').value = 'tshirts';
            document.getElementById('prodSizes').value = 'S,M,L,XL';
            document.getElementById('prodImg').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = parseInt(document.getElementById('prodPrice').value);
            const category = document.getElementById('prodCategory').value;
            const sizes = document.getElementById('prodSizes').value.split(',').map(s => s.trim().toUpperCase());
            const img = document.getElementById('prodImg').value || "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=200";
            
            if (!name || !price) {
                alert('Заполните название и цену!');
                return;
            }
            
            const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 100;
            
            products.push({
                id: newId,
                name: name,
                price: price,
                category: category,
                sizes: sizes,
                img: img,
                desc: ""
            });
            
            localStorage.setItem('reverage_products', JSON.stringify(products));
            
            // Синхронизация с сайтом
            if (window.syncProductsFromAdmin) {
                window.syncProductsFromAdmin(products);
            }
            
            closeModal();
            renderProducts();
            updateStats();
            alert('Товар добавлен! Обновите главную страницу.');
        }
        
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            const newName = prompt("Новое название:", product.name);
            if (!newName) return;
            const newPrice = parseInt(prompt("Новая цена:", product.price));
            if (!newPrice) return;
            
            product.name = newName;
            product.price = newPrice;
            
            localStorage.setItem('reverage_products', JSON.stringify(products));
            
            if (window.syncProductsFromAdmin) {
                window.syncProductsFromAdmin(products);
            }
            
            renderProducts();
            updateStats();
            alert('Товар изменен!');
        }
        
        function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            
            products = products.filter(p => p.id !== id);
            localStorage.setItem('reverage_products', JSON.stringify(products));
            
            if (window.syncProductsFromAdmin) {
                window.syncProductsFromAdmin(products);
            }
            
            renderProducts();
            updateStats();
            alert('Товар удален!');
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'admin-login.html';
        }
        
        // Проверка входа
        (function() {
            const isAuth = sessionStorage.getItem('admin_authenticated');
            if (!isAuth && !window.location.pathname.includes('admin-login.html')) {
                window.location.href = 'admin-login.html';
            }
        })();
        
        loadData();
    </script>
</body>
</html>
