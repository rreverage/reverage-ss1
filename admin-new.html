<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>REVERAGE - Админ панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #fff; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h2 { font-size: 32px; color: #00ff00; }
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button.danger { background: #ff4444; color: white; }
        .product-card {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .products-list { margin-top: 20px; }
        input, select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            margin: 5px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        .form-group { margin: 15px 0; }
        label { display: inline-block; width: 100px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛍️ REVERAGE SS1 - Админ панель</h1>
    
    <div class="stats">
        <div class="stat-card"><h2 id="totalProducts">0</h2><p>Товаров</p></div>
        <div class="stat-card"><h2 id="totalOrders">0</h2><p>Заказов</p></div>
        <div class="stat-card"><h2 id="totalRevenue">0 ₽</h2><p>Выручка</p></div>
    </div>
    
    <div style="margin-bottom: 20px;">
        <button onclick="showAddModal()">➕ Добавить товар</button>
        <button onclick="loadData()">🔄 Обновить</button>
        <button onclick="logout()">🚪 Выход</button>
    </div>
    
    <div class="products-list" id="productsList"></div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Добавить товар</h3>
        <div class="form-group"><label>Название:</label><input type="text" id="prodName" placeholder="Название"></div>
        <div class="form-group"><label>Цена:</label><input type="number" id="prodPrice" placeholder="Цена"></div>
        <div class="form-group"><label>Категория:</label>
            <select id="prodCategory">
                <option value="tshirts">Футболки</option><option value="hoodies">Худи</option>
                <option value="jackets">Куртки</option><option value="pants">Штаны</option>
                <option value="shorts">Шорты</option><option value="accessories">Аксессуары</option>
            </select>
        </div>
        <div class="form-group"><label>Размеры:</label><input type="text" id="prodSizes" placeholder="S,M,L,XL"></div>
        <button onclick="addProduct()">Сохранить</button>
    </div>
</div>

<script>
    let products = [], orders = [];
    
    function loadData() {
        const saved = localStorage.getItem('reverage_products');
        products = saved ? JSON.parse(saved) : [
            { id: 1, name: "OVERSIZED HOODIE BLACK", price: 8990, category: "hoodies", sizes: ["S","M","L","XL"] },
            { id: 2, name: "CARGO PANTS SS1", price: 7490, category: "pants", sizes: ["S","M","L","XL"] },
            { id: 3, name: "GRAPHIC TEE WHITE", price: 3990, category: "tshirts", sizes: ["S","M","L","XL"] }
        ];
        const savedOrders = localStorage.getItem('reverage_orders_admin');
        orders = savedOrders ? JSON.parse(savedOrders) : [];
        updateStats();
        renderProducts();
    }
    
    function updateStats() {
        document.getElementById('totalProducts').innerText = products.length;
        document.getElementById('totalOrders').innerText = orders.length;
        const revenue = orders.reduce((s, o) => s + o.total, 0);
        document.getElementById('totalRevenue').innerText = revenue.toLocaleString() + " ₽";
    }
    
    function renderProducts() {
        const container = document.getElementById('productsList');
        if (!container) return;
        if (products.length === 0) { container.innerHTML = '<p>Нет товаров</p>'; return; }
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div><strong>${p.name}</strong><br>${p.price.toLocaleString()} ₽<br><small>${p.category} | ${p.sizes.join(", ")}</small></div>
                <div><button onclick="editProduct(${p.id})">✏️ Изменить</button><button class="danger" onclick="deleteProduct(${p.id})">🗑️ Удалить</button></div>
            </div>
        `).join('');
    }
    
    function showAddModal() {
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('productModal').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    
    function addProduct() {
        const name = document.getElementById('prodName').value;
        const price = parseInt(document.getElementById('prodPrice').value);
        if (!name || !price) { alert('Заполните поля!'); return; }
        const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 100;
        products.push({ id: newId, name, price, category: "tshirts", sizes: ["S","M","L","XL"], desc: "", img: "" });
        localStorage.setItem('reverage_products', JSON.stringify(products));
        closeModal();
        renderProducts();
        updateStats();
        alert('Товар добавлен!');
    }
    
    function editProduct(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;
        const newName = prompt("Название:", p.name);
        if (!newName) return;
        const newPrice = parseInt(prompt("Цена:", p.price));
        if (!newPrice) return;
        p.name = newName; p.price = newPrice;
        localStorage.setItem('reverage_products', JSON.stringify(products));
        renderProducts();
        updateStats();
        alert('Товар изменен!');
    }
    
    function deleteProduct(id) {
        if (!confirm('Удалить товар?')) return;
        products = products.filter(p => p.id !== id);
        localStorage.setItem('reverage_products', JSON.stringify(products));
        renderProducts();
        updateStats();
        alert('Товар удален!');
    }
    
    function logout() { sessionStorage.clear(); window.location.href = 'admin-login.html'; }
    
    // Проверка входа
    if (!window.location.pathname.includes('admin-login.html')) {
        if (!sessionStorage.getItem('admin_authenticated')) {
            window.location.href = 'admin-login.html';
        }
    }
    
    loadData();
</script>
</body>
</html>
