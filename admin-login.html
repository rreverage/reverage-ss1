<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVERAGE SS1 — Вход в админку</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: white; }
        .logo span { background: white; color: black; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: rgba(255, 255, 255, 0.7); font-size: 12px; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        button:hover { background: #ddd; }
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            color: #ff4444;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .security-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        .security-info p { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>REVERAGE<span>SS1</span></h1>
            <p style="font-size: 12px; color: gray; margin-top: 5px;">Админ панель</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>👤 ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                <input type="text" id="username" value="admin">
            </div>
            
            <div class="form-group">
                <label>🔑 ПАРОЛЬ</label>
                <input type="password" id="password" value="admin123">
            </div>
            
            <button type="submit">ВОЙТИ В АДМИНКУ</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="security-info">
            <p>✅ Вход в админ-панель REVERAGE SS1</p>
            <p>✅ Логин: admin | Пароль: admin123</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            // Проверка логина и пароля
            if (username === 'admin' && password === 'admin123') {
                sessionStorage.setItem('admin_authenticated', 'true');
                sessionStorage.setItem('admin_login_time', Date.now().toString());
                window.location.href = 'admin.html';
            } else {
                errorDiv.textContent = '❌ Неверный логин или пароль';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
